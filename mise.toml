# mise: toolchain + tools + task runner for the golings learning repo.
# Run `mise install` once to provision everything, then `mise run <task>`.

[tools]
go = "1.26.4"
node = "22"
goreleaser = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = "latest"

[env]
# put our locally-built binary on PATH
_.path = ["{{config_root}}/bin"]

[tasks.build]
description = "Build our forked golings binary into ./bin"
run = "go build -o bin/golings ./golings"

[tasks.watch]
description = "Interactive watch loop (build first)"
depends = ["build"]
run = "./bin/golings watch"

[tasks.list]
description = "List all exercises + progress"
depends = ["build"]
run = "./bin/golings list"

[tasks.release-check]
description = "Validate the goreleaser config and build a local snapshot"
run = "goreleaser check && goreleaser build --snapshot --clean --single-target"

[tasks.update]
description = "Pull the latest changes without losing your exercise progress"
run = """
set -e
echo '→ shelving your exercise edits…'
if ! git diff --quiet -- exercises || [ -n "$(git ls-files --others --exclude-standard -- exercises)" ]; then
  git stash push -u -m golings-autostash -- exercises
  stashed=1
else
  echo '  (nothing to shelve)'
  stashed=0
fi
echo '→ pulling latest…'
git pull --ff-only
if [ "$stashed" = 1 ]; then
  echo '→ restoring your edits…'
  git stash pop
fi
echo '✓ up to date. Your progress in .golings-state.json was never touched.'
"""

[tasks.lint]
description = "Lint the tool source (exercises are broken on purpose)"
run = "golangci-lint run ./golings ./golings/cmd ./golings/exercises ./golings/tui ./golings/ui"

[tasks.test]
description = "Test the tool source with the race detector"
run = "go test -race $(go list ./golings/... | grep -v fixtures)"

[tasks.gen-site]
description = "Generate docs site content from info.toml + READMEs"
run = "go run ./web/gen"

[tasks.site]
description = "Generate content and run the docs dev server"
depends = ["gen-site"]
dir = "{{config_root}}/web"
run = "npm install && npm run dev"

[tasks.site-build]
description = "Generate content and build the docs site"
depends = ["gen-site"]
dir = "{{config_root}}/web"
run = "npm ci && npm run build"
